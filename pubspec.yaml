publish_to: 'none'

version: 1.0.5+6

environment:
  sdk: ^3.11.0

workspace:
  - packages/*

dependencies:
  flutter:
    sdk: flutter
  intl: any

  custom_go_router:
    path: packages/custom_go_router

  nu_assets:
    path: packages/nu_assets

  nu_l10n:
    path: packages/nu_l10n

  error_handler_with_result:
    path: packages/error_handler_with_result


  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  dio: ^5.4.1
  google_fonts: ^8.0.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  shared_preferences: ^2.2.2
  path: ^1.9.0
  cached_network_image: ^3.4.1
  validatorless: ^1.2.3
  get_it: ^9.2.1
  crypto: any


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true